<body>
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
  <div id="hint">tap to pause</div>

<script>
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d', { willReadFrequently: true });
  const hint = document.getElementById('hint');

  let paused = false;

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  async function start() {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } },
      audio: false
    });
    video.srcObject = stream;
    await video.play();
    render();
    setTimeout(() => { hint.style.opacity = '0'; }, 3000);
  }

  function render() {
    requestAnimationFrame(render);
    if (paused) return;

    const vw = canvas.width, vh = canvas.height;
    const vr = video.videoWidth / video.videoHeight;
    const cr = vw / vh;
    let sx, sy, sw, sh;
    if (vr > cr) {
      sh = video.videoHeight; sw = sh * cr;
      sx = (video.videoWidth - sw) / 2; sy = 0;
    } else {
      sw = video.videoWidth; sh = sw / cr;
      sx = 0; sy = (video.videoHeight - sh) / 2;
    }

    ctx.drawImage(video, sx, sy, sw, sh, 0, 0, vw, vh);
    const img = ctx.getImageData(0, 0, vw, vh);
    const d = img.data;
    for (let i = 0; i < d.length; i += 4) {
      d[i]   = 255 - d[i];
      d[i+1] = 255 - d[i+1];
      d[i+2] = 255 - d[i+2];
    }
    ctx.putImageData(img, 0, 0);
  }

  document.addEventListener('click', () => { paused = !paused; });

  start().catch(() => { document.body.style.background = '#111'; });
</script>

</body>
</html>
