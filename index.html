<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Invert</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
    }
    video {
      position: fixed;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      opacity: 0;
    }
    canvas {
      position: fixed;
      inset: 0;
      width: 100%; height: 100%;
    }
    #hint {
      position: fixed;
      bottom: 40px;
      left: 0; right: 0;
      text-align: center;
      font-family: system-ui, sans-serif;
      font-size: 13px;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.05em;
      pointer-events: none;
      transition: opacity 1s;
    }
  </style>
</head>
<body>
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
  <div id="hint">tap to pause</div>
<script>
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d', { willReadFrequently: true });
  const hint = document.getElementById('hint');

  let paused = false;

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  async function start() {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } },
      audio: false
    });
    video.srcObject = stream;
    await video.play();
    render();
    setTimeout(() => { hint.style.opacity = '0'; }, 3000);
  }

  function applyPortra400(d) {
    for (let i = 0; i < d.length; i += 4) {
      let r = d[i];
      let g = d[i+1];
      let b = d[i+2];

      // Remove orange mask
      r = Math.min(255, r * 0.60);
      g = Math.min(255, g * 0.80);
      b = Math.min(255, b * 1.10);

      // Invert
      r = 255 - r;
      g = 255 - g;
      b = 255 - b;

      // Post-invert white balance — blue pulled down harder to kill teal blacks
      r = r * 1.20;
      g = g * 1.00;
      b = b * 0.62;

      // S-curve
      r = scurve(r);
      g = scurve(g);
      b = scurve(b);

      d[i]   = Math.max(0, Math.min(255, r));
      d[i+1] = Math.max(0, Math.min(255, g));
      d[i+2] = Math.max(0, Math.min(255, b));
    }
  }

  function scurve(v) {
    v = v / 255;
    v = v < 0.5
      ? 0.5 * Math.pow(v * 2, 0.85)
      : 1 - 0.5 * Math.pow((1 - v) * 2, 0.85);
    return v * 255;
  }

  function render() {
    requestAnimationFrame(render);
    if (paused) return;

    const vw = canvas.width, vh = canvas.height;
    const vr = video.videoWidth / video.videoHeight;
    const cr = vw / vh;
    let sx, sy, sw, sh;
    if (vr > cr) {
      sh = video.videoHeight; sw = sh * cr;
      sx = (video.videoWidth - sw) / 2; sy = 0;
    } else {
      sw = video.videoWidth; sh = sw / cr;
      sx = 0; sy = (video.videoHeight - sh) / 2;
    }

    ctx.drawImage(video, sx, sy, sw, sh, 0, 0, vw, vh);
    const img = ctx.getImageData(0, 0, vw, vh);
    applyPortra400(img.data);
    ctx.putImageData(img, 0, 0);
  }

  document.addEventListener('click', () => { paused = !paused; });

  start().catch(() => { document.body.style.background = '#111'; });
</script>
</body>
</html>
